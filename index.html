<!DOCTYPE html>
<html>
<head>
<title>Raj IDE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Raj IDE</h1>

<button onclick="openTab('design')">Design</button>

<div id="design" class="tab">

<textarea id="srsInput" placeholder="Enter SRS"></textarea>

<br/>

<button onclick="generateDesign()">Generate Design</button>
<button onclick="generateDiagram()">View UML</button>
<h3>UML Editor</h3>

<iframe 
  id="diagramFrame"
  src="https://embed.diagrams.net/?embed=1&proto=json&ui=atlas&spin=1&libraries=1"
  width="100%" 
  height="600px"
  frameborder="0">
</iframe>

<br/>

<button onclick="saveDiagram()">Save Diagram</button>
<button onclick="loadDiagram()">Load Diagram</button>

<pre id="designOutput"></pre>

</div>

<script src="app.js"></script>

</body>
</html>
